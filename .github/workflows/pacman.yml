name: Generate pacman animation

on:
  schedule: # execute every 12 hours
    - cron: "* */12 * * *"

  workflow_dispatch:

  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate pacman-contribution-graph.svg
        uses: abozanona/pacman-contribution-graph@main
        with:
          github_user_name: ${{ github.repository_owner }}

      - name: Move generated files to dist
        run: |
          mkdir -p dist
          mv pacman-contribution-graph.svg dist/
          mv pacman-contribution-graph-dark.svg dist/ || true

      - name: push pacman-contribution-graph.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
          keep_history: true # Tùy chọn: Thêm để không bị ghi đè các file khác (ví dụ: snake.svg) trên nhánh output
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
